<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="arcade-container">
        <h1>Snaik</h1>
        
        <div id="volume-container">
            <span id="volume-icon">🔊</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
            <img id="secret-egg" src="egg.png" alt="???">
        </div>

        <!-- NEW: HTML Arcade Scoreboard Element -->
        <div id="scoreboard">
            <span id="current-score">SCORE: 0</span>
            <span id="high-score">HIGH SCORE: 0</span>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <p>Use Arrows / WASD to move | Press ESC to pause</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
